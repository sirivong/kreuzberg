name: Setup PaddleOCR Models Cache
description: Download pinned PaddleOCR ONNX artifacts into the standard Hugging Face cache

inputs:
  cache-enabled:
    description: Enable GitHub Actions caching for the Hugging Face Hub cache
    required: false
    default: "true"
  models:
    description: Comma-separated runtime model groups to setup (det,cls,rec)
    required: false
    default: "det,cls,rec"
  cache-key-suffix:
    description: Prefix for the GitHub Actions cache key
    required: false
    default: "paddle-ocr-v5-onnx"

outputs:
  cache-hit:
    description: Whether the Hugging Face cache was restored
    value: ${{ steps.cache-models.outputs.cache-hit }}
  cache-dir:
    description: Standard Hugging Face Hub cache root
    value: ${{ steps.set-outputs.outputs.cache-dir }}
  models-available:
    description: Comma-separated list of verified model groups
    value: ${{ steps.download-models.outputs.available-models }}

runs:
  using: composite
  steps:
    - name: Configure Hugging Face cache
      shell: bash
      run: |
        mkdir -p "$HOME/.cache/huggingface/hub"
        echo "HF_HUB_CACHE=$HOME/.cache/huggingface/hub" >> "$GITHUB_ENV"

    - name: Restore Hugging Face model cache
      if: inputs.cache-enabled == 'true'
      uses: actions/cache@v5
      id: cache-models
      with:
        path: ~/.cache/huggingface/hub
        key: ${{ inputs.cache-key-suffix }}-${{ runner.os }}-${{ runner.arch }}-bfaf0b492cfc1dee
        restore-keys: |
          ${{ inputs.cache-key-suffix }}-${{ runner.os }}-${{ runner.arch }}-
          ${{ inputs.cache-key-suffix }}-${{ runner.os }}-

    - name: Install Hugging Face CLI
      shell: bash
      run: python -m pip install --disable-pip-version-check 'huggingface_hub>=0.34,<2'

    - name: Download and verify pinned runtime artifacts
      id: download-models
      shell: bash
      env:
        REQUESTED_MODELS: ${{ inputs.models }}
      run: |
        set -euo pipefail
        REPO="xberg-io/paddleocr-onnx-models"
        REVISION="bfaf0b492cfc1dee0c73245fc5860bfdcf2c3443"
        FILES=()
        CHECKSUMS=()
        AVAILABLE=()

        if [[ ",$REQUESTED_MODELS," == *,det,* ]]; then
          FILES+=("v2/det/server.onnx")
          CHECKSUMS+=("d5f46afc7a2b7fe5773c4ce6ff05c9e23631eb5de0f59d7a90404d9c49678f3c")
          AVAILABLE+=("det")
        fi
        if [[ ",$REQUESTED_MODELS," == *,cls,* ]]; then
          FILES+=("v2/classifiers/PP-LCNet_x1_0_textline_ori.onnx")
          CHECKSUMS+=("1090f9f483a115f904beefe04acc9d28edf0c0b7b08cf0dd8d0ea59a9e0f2735")
          AVAILABLE+=("cls")
        fi
        if [[ ",$REQUESTED_MODELS," == *,rec,* ]]; then
          FILES+=("v2/rec/unified_server/model.onnx" "v2/rec/unified_server/dict.txt")
          CHECKSUMS+=("00667becb28bcd49dfbcb8c7724aa8d6e8f01a1444db66e404182431e0fcbc14" "74f75c9f414da39d503635e76c6871baf8ab8df3b5a47072d55b9344483086c9")
          AVAILABLE+=("rec")
        fi

        if [ ${#FILES[@]} -eq 0 ]; then
          echo "No recognized model groups requested: $REQUESTED_MODELS" >&2
          exit 1
        fi

        for index in "${!FILES[@]}"; do
          file="${FILES[$index]}"
          path=$(hf download "$REPO" "$file" --revision "$REVISION" --cache-dir "$HF_HUB_CACHE" --quiet)
          printf '%s  %s\n' "${CHECKSUMS[$index]}" "$path" | sha256sum --check --status
          echo "Verified $file in the Hugging Face cache"
        done

        available=$(IFS=,; echo "${AVAILABLE[*]}")
        echo "available-models=$available" >> "$GITHUB_OUTPUT"

    - name: Set cache directory output
      id: set-outputs
      shell: bash
      run: echo "cache-dir=$HF_HUB_CACHE" >> "$GITHUB_OUTPUT"
